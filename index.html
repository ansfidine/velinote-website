<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velinote</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#1c1b1f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
.logo{width:120px;margin-bottom:24px}
h1{font-size:48px;font-weight:700;margin-bottom:8px;letter-spacing:-0.5px}
.tagline{font-size:18px;color:#6750a4;margin-bottom:48px}
.lang-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:700px}
.lang-card{display:flex;align-items:center;gap:12px;background:#f7f2fa;border:1px solid #e7e0ec;border-radius:16px;padding:16px 28px;text-decoration:none;color:#1c1b1f;font-size:17px;font-weight:500;transition:all .2s}
.lang-card:hover{background:#e8def8;transform:translateY(-2px);box-shadow:0 4px 12px rgba(103,80,164,.15)}
.lang-card img{width:28px;height:20px;border-radius:3px;object-fit:cover}
.footer{margin-top:60px;font-size:13px;color:#999}
.footer a{color:#6750a4;text-decoration:none}
</style>
</head>
<body>
<img class="logo" src="img/App_Icon.png" alt="Velinote">
<h1>Velinote</h1>
<p class="tagline">A beautiful private notes app. No ads. No tracking. Just your thoughts.</p>
<div class="lang-grid">
<a class="lang-card" href="en.html">🇬🇧 English</a>
<a class="lang-card" href="fr.html">🇫🇷 Français</a>
<a class="lang-card" href="zh.html">🇨🇳 中文</a>
</div>
<p class="footer"><a href="https://github.com/ansfidine/Velinote">Open Source</a> · <a href="https://ansfidine.github.io/app-policies/velinote">Privacy</a></p>
</body>
</html>
